<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TFT Modular — Offline Slice</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, Segoe UI, sans-serif;
        background: #0f1419;
        color: #e7ecf1;
      }
      body {
        margin: 0;
        padding: 1rem 1.25rem 2rem;
        line-height: 1.4;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.25rem;
      }
      .meta {
        color: #9aa7b5;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      #app {
        display: grid;
        gap: 1rem;
        max-width: 960px;
      }
      section {
        background: #1a222c;
        border: 1px solid #2a3542;
        border-radius: 8px;
        padding: 0.75rem 1rem;
      }
      section h2 {
        font-size: 0.95rem;
        margin: 0 0 0.5rem;
        color: #b8c4d0;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }
      button {
        background: #2d6cdf;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 0.4rem 0.7rem;
        cursor: pointer;
        font: inherit;
      }
      button:hover:not(:disabled) {
        background: #4580ef;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      button.secondary {
        background: #3a4654;
      }
      button.danger {
        background: #a33b3b;
      }
      .shop-card {
        min-width: 7.5rem;
        background: #121820;
        border: 1px solid #334050;
        border-radius: 6px;
        padding: 0.5rem;
        font-size: 0.9rem;
      }
      .shop-card.empty {
        color: #6b7785;
        font-style: italic;
      }
      .board-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(4rem, 1fr));
        gap: 0.35rem;
      }
      .cell {
        min-height: 2.6rem;
        background: #121820;
        border: 1px solid #334050;
        border-radius: 4px;
        padding: 0.35rem;
        font-size: 0.8rem;
        cursor: pointer;
      }
      .cell.selected,
      .bench-item.selected {
        outline: 2px solid #f0c14b;
      }
      .bench-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .bench-item {
        background: #121820;
        border: 1px solid #334050;
        border-radius: 4px;
        padding: 0.35rem 0.5rem;
        font-size: 0.85rem;
        cursor: pointer;
      }
      pre {
        margin: 0;
        max-height: 220px;
        overflow: auto;
        font-size: 0.78rem;
        background: #0c1015;
        border-radius: 4px;
        padding: 0.5rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .error {
        color: #ff8e8e;
      }
      .ok {
        color: #8dffa5;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <h1>TFT Modular — offline vertical slice</h1>
    <p class="meta">
      Fixed seed <code>42</code> for QA · wasm match + reference-mod bundle
    </p>
    <div id="app">Loading…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
